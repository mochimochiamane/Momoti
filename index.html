<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 AI アシスタント（最強版）</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: sans-serif; text-align: center; background:#faf8ef; }
.grid { display:grid; grid-template-columns: repeat(4,70px); gap:10px; justify-content:center; margin:20px; }
.cell { width:70px; height:70px; background:#cdc1b4; display:flex; align-items:center; justify-content:center; font-size:18px; border-radius:8px; cursor:pointer; }
button { padding:12px 16px; font-size:16px; border:none; border-radius:8px; background:#8f7a66; color:white; margin:5px; }
.result { font-size:24px; margin-top:20px; }
</style>
</head>

<body>
<h2>2048 AI アシスタント（最強版）</h2>

<div class="grid" id="grid"></div>

<div>
  <button onclick="analyze()">解析</button>
  <button onclick="undo()">1手戻る</button>
</div>

<div class="result" id="result"></div>

<script>
// Service Worker登録
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

const gridEl = document.getElementById('grid');
let cells = [];
let history = [];

// タップで値変更
function nextValue(v){
  if(v===0) return 2;
  if(v>=2048) return 0;
  return v*2;
}

// グリッド生成
for(let i=0;i<16;i++){
  const cell=document.createElement('div');
  cell.className='cell';
  cell.innerText='';
  cell.value=0;

  cell.onclick = () => {
    saveState();
    cell.value = nextValue(cell.value);
    cell.innerText = cell.value===0 ? '' : cell.value;
  };

  gridEl.appendChild(cell);
  cells.push(cell);
}

// 履歴保存
function saveState(){
  let state = cells.map(c=>c.value);
  history.push(state);
}

// 戻る
function undo(){
  if(history.length===0) return;
  let prev = history.pop();
  for(let i=0;i<16;i++){
    cells[i].value = prev[i];
    cells[i].innerText = prev[i]===0 ? '' : prev[i];
  }
}

// グリッド取得
function getGrid(){
  let g=[];
  for(let i=0;i<4;i++){
    g[i]=[];
    for(let j=0;j<4;j++){
      g[i][j]=cells[i*4+j].value;
    }
  }
  return g;
}

// クローン
function clone(g){ return g.map(r=>r.slice()); }

// 左移動
function moveLeft(grid){
  let moved=false;
  for(let i=0;i<4;i++){
    let row=grid[i].filter(v=>v);
    for(let j=0;j<row.length-1;j++){
      if(row[j]===row[j+1]){ row[j]*=2; row[j+1]=0; }
    }
    row=row.filter(v=>v);
    while(row.length<4) row.push(0);
    if(grid[i].toString()!=row.toString()) moved=true;
    grid[i]=row;
  }
  return moved;
}

// 回転
function rotate(g){
  let r=[[],[],[],[]];
  for(let i=0;i<4;i++)for(let j=0;j<4;j++) r[j][3-i]=g[i][j];
  return r;
}

// 移動
function move(grid,dir){
  let g=clone(grid);
  for(let i=0;i<dir;i++) g=rotate(g);
  let moved=moveLeft(g);
  for(let i=0;i<(4-dir)%4;i++) g=rotate(g);
  return {grid:g,moved};
}

// 評価関数
function evaluate(grid){
  let empty=0;
  for(let r of grid)for(let v of r) if(v===0) empty++;
  return empty * 10000;
}

// AI
function expectimax(grid, depth, isPlayer){
  if(depth===0) return evaluate(grid);

  if(isPlayer){
    let best=-Infinity;
    for(let d=0;d<4;d++){
      let {grid:g,moved}=move(grid,d);
      if(!moved) continue;
      best=Math.max(best, expectimax(g, depth-1, false));
    }
    return best;
  } else {
    let cellsList=[];
    for(let i=0;i<4;i++)for(let j=0;j<4;j++) if(grid[i][j]===0) cellsList.push([i,j]);
    if(cellsList.length===0) return evaluate(grid);

    let total=0;
    for(let [i,j] of cellsList){
      let g2=clone(grid);
      g2[i][j]=2;
      total+=expectimax(g2, depth-1, true);
    }
    return total/cellsList.length;
  }
}

// 解析
function analyze(){
  const grid=getGrid();
  const dirs=['←','↑','→','↓'];

  let best=-Infinity;
  let bestDir='なし';

  for(let d=0;d<4;d++){
    let {grid:g,moved}=move(grid,d);
    if(!moved) continue;

    let val=expectimax(g,5,false);
    if(val>best){ best=val; bestDir=dirs[d]; }
  }

  document.getElementById('result').innerText='おすすめ: '+bestDir;
}
</script>

</body>
</html>
